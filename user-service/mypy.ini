[mypy]
# Let mypy find local 'db' and 'utils' packages under `app`
mypy_path = app

# Silence missing stubs for some third-party libraries used here
[mypy-asyncpg]
ignore_missing_imports = True

[mypy-bcrypt]
ignore_missing_imports = True

# Optionally ignore other third-party missing stubs
[mypy-protovalidate]
ignore_missing_imports = True
