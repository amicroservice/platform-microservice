syntax = "proto3";

package platform;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

service PlatformService {
    rpc Create(CreateRequest) returns (CreateResponse) {}
    rpc Get(GetRequest) returns (GetResponse) {}
    rpc Update(UpdateRequest) returns (UpdateResponse) {}
    rpc List(ListRequest) returns (stream Platform) {}
}

message CreateRequest {
    string name = 1;
    string domain_name = 2;
    optional google.protobuf.Struct properties = 3;
}

message CreateResponse {
    oneof response {
        Platform success = 1;
        ValidationError error = 2;
    }
}

message GetRequest {
    string id = 1;
}

message GetResponse {
    oneof response {
        Platform success = 1;
        ValidationError error = 2;
    }
}

message UpdateRequest {
    string id = 1;
    optional string name = 2;
    optional string domain_name = 3;
    optional google.protobuf.Struct properties = 4;
}

message UpdateResponse {
    oneof response {
        Platform success = 1;
        ValidationError error = 2;
    }
}

message ListRequest {
    string order_by = 1;
    int32 limit = 2;
    int32 offset = 3;
    map<string, string> filters = 4;
}

message Platform {
    string id = 1;
    google.protobuf.Timestamp created_at = 2;
    google.protobuf.Timestamp updated_at = 3;
    string name = 4;
    string domain_name = 5;
    google.protobuf.Struct properties = 6;
}

message ValidationError {
    repeated FieldError field_errors = 1;
    string message = 2;
}

message FieldError {
    string field = 1;
    string code = 2;
    string message = 3;
}
